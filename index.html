<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>供应链商家规则&体验部 - 新人入职Landing系统（主管配置端）</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    .gradient-bg { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); }
    .task-item { transition: all 0.2s; border-left: 4px solid #e5e7eb; }
    .task-item.completed { border-left-color: #10b981; background: #f0fdf4; }
    .task-item.in-progress { border-left-color: #3b82f6; background: #eff6ff; }
    .phase-header { border-left: 4px solid; padding-left: 12px; margin: 16px 0 8px; }
    .metric-card { background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); }
    .btn-primary { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; }
    .btn-success { background: linear-gradient(135deg, #10b981, #059669); color: white; }
    .card-shadow { box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06); }
    .role-btn.active { background: #3b82f6; color: white; }
    .owner-badge { position: relative; }
    .owner-badge .badge-count { position: absolute; top: -8px; right: -8px; background: #ef4444; color: white; border-radius: 9999px; padding: 0 6px; font-size: 12px; }
    input, textarea, select { border: 1px solid #d1d5db; border-radius: 6px; padding: 8px 12px; width: 100%; }
    input:focus, textarea:focus, select:focus { outline: none; border-color: #3b82f6; ring: 2px solid #bfdbfe; }
    .notification { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 8px; color: white; z-index: 9999; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .progress-bar { height: 8px; background: #e5e7eb; border-radius: 4px; overflow: hidden; }
    .progress-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ========== 常量定义 ==========
    const ROLES = {
      manager: { id: 'manager', name: '主管', icon: '👨‍💼', color: 'bg-blue-600', desc: '负责整体规划、部门及模块配置、归档路径设置、Owner分配、新人跟进' },
      owner: { id: 'owner', name: '模块Owner', icon: '🎯', color: 'bg-green-600', desc: '负责模块学习资料及题目库填写与提交' }
    };

    const PHASES = [
      { id: 'pre', name: '入职前准备阶段', week: '入职前', desc: '主管配置部门、归档路径及业务模块资料', color: '#3b82f6' },
      { id: 'phase1', name: '第一阶段（新人初期）', week: '第1-2周', deliverable: '第2周最后工作日', desc: '融入团队，了解组织架构，学习本部门及各模块资料，完成模块学习标记与Owner自测', color: '#10b981' },
      { id: 'phase2', name: '第二阶段（3-4周）', week: '第2-4周', deliverable: '第4周最后工作日', desc: '掌握业务全链路逻辑，对齐OKR目标', color: '#f59e0b' },
      { id: 'phase3', name: '第三阶段（5-8周）', week: '第5-8周', deliverable: '第8周最后工作日', desc: '初步参与核心业务，确定业务方向，准备转正', color: '#8b5cf6' },
      { id: 'phase4', name: '第四阶段（9-12周）', week: '第9-12周', deliverable: '第12周转正答辩', desc: '深度参与业务，完成转正答辩', color: '#ec4899' }
    ];

    const DEFAULT_DELIVERABLES = [
      { phase: 'phase1', phaseName: '第一阶段（新人初期）', name: '组织架构图学习笔记', path: '' },
      { phase: 'phase1', phaseName: '第一阶段（新人初期）', name: '部门知识库学习总结', path: '' },
      { phase: 'phase2', phaseName: '第二阶段（3-4周）', name: '各模块业务学习报告', path: '' },
      { phase: 'phase2', phaseName: '第二阶段（3-4周）', name: '实习期目标设定', path: '' },
      { phase: 'phase3', phaseName: '第三阶段（5-8周）', name: '业务参与实践报告', path: '' },
      { phase: 'phase3', phaseName: '第三阶段（5-8周）', name: '转正答辩PPT', path: '' },
      { phase: 'phase4', phaseName: '第四阶段（9-12周）', name: '转正答辩记录', path: '' }
    ];

    // ========== 初始数据 ==========
    const INITIAL_DEPT_CONFIG = {
      deptName: 'AE供应链-供应链商家规则&体验',
      knowledgeBase: 'https://alidocs.dingtalk.com/i/spaces/nb9XJjZvjP8pOXyA/overview',
      coreMetrics: '效率&体验',
      dashboard: 'https://fbi.alibaba-inc.com/dashboard/view/page.htm?spm=a2o1z.8190073.0.0.d7a0543fsCHJIA&id=1568845&_dt_ac=2AkYTKz2YBIuhP2F%2F%2F00ozL2SozER7SITNV%2BNuYgGo3gU14RdQzz4yXlLV4yY3w59X8%2FyWheM26zDlCD%2F&_dt_sig=PTPXG49LUd4qkaCeiGjB4iRxuSApdJkmhx2ijMkmYgg%3D&_dt_ts=1777009936'
    };

    const INITIAL_ARCHIVE_CONFIG = {
      archiveUrl: 'https://alidocs.dingtalk.com/i/nodes/lyQod3RxJKe9QjOMi40NzYn1Wkb4Mw9r',
      qaFolder: 'Q&A问答',
      deliverableFolder: '阶段交付物',
      autoArchive: true,
      qaArchiveUrl: 'https://alidocs.dingtalk.com/i/nodes/14lgGw3P8vxjwogPCpObjzerV5daZ90D',
      stageDeliverables: [...DEFAULT_DELIVERABLES]
    };

    const INITIAL_MODULES = [
      { id: 'mod-1', name: '效率-及时发货率', owner: '潇淦', knowledgeBase: '', metric: '及时发货率', dashboard: 'https://sg.fbi.alibaba-inc.com/dashboard/view/page.htm?spm=a2o1z.8190076.0.0.6a12543fm463d1&id=365969', questionBank: '', ownerQuestionBank: '', hasExam: false, status: 'pending' },
      { id: 'mod-2', name: '效率-成交不卖率', owner: '石怡', knowledgeBase: '', metric: 'GMV挽回', dashboard: 'https://fbi.alibaba-inc.com/dashboard/view/page.htm?spm=a2o1z.8190073.0.0.d7a0543f5p24pL&id=1711018', questionBank: '', ownerQuestionBank: '', hasExam: false, status: 'pending' },
      { id: 'mod-3', name: '商家体验', owner: '颜西', knowledgeBase: 'https://alidocs.dingtalk.com/i/nodes/QG53mjyd800agdlKHlKQ6wk586zbX04v', metric: '商家全模式体验', dashboard: 'https://fbi.alibaba-inc.com/dashboard/view/page.htm?spm=a2o1z.8190073.0.0.d7a0543fRYKwiW&id=1837786', questionBank: '', ownerQuestionBank: '', hasExam: false, status: 'pending' },
      { id: 'mod-4', name: '团队内小二AI能力成长', owner: '小麦', knowledgeBase: 'https://aliyuque.antfin.com/moh6q1/kg7h1z', metric: '/', dashboard: '/', questionBank: '', ownerQuestionBank: '', hasExam: false, status: 'pending' }
    ];

    const NEWBIE_INFO = {
      name: '麦风',
      joinDate: '2026-05-01',
      mentor: '潇淦',
      dept: 'AE供应链-供应链商家规则&体验'
    };

    const RELATED_DEPTS = [
      'AE供应链-商品供应链',
      'AE供应链-AE货通供应链运营',
      'AE供应链-供应链网络运营',
      'AE供应链-品仓解决方案',
      'AE供应链-计划供应链',
      'AE供应链-竞对调研'
    ];

    const NEWBIE_PROGRESS_DATA = {
      overallProgress: 0,
      teamIntegration: 0,
      businessMastery: 0,
      modules: [
        { name: '效率-及时发货率', progress: 0, score: null, status: 'pending' },
        { name: '效率-成交不卖率', progress: 0, score: null, status: 'pending' },
        { name: '商家体验', progress: 0, score: null, status: 'pending' },
        { name: '团队内小二AI能力成长', progress: 0, score: null, status: 'pending' }
      ],
      deliverables: [
        { phase: '第一阶段', name: '组织架构图学习笔记', status: 'pending', date: '待开始' },
        { phase: '第一阶段', name: '部门知识库学习总结', status: 'pending', date: '待开始' },
        { phase: '第二阶段', name: '各模块业务学习报告', status: 'pending', date: '待开始' },
        { phase: '第二阶段', name: '实习期目标设定', status: 'pending', date: '待开始' },
        { phase: '第三阶段', name: '业务参与实践报告', status: 'pending', date: '待开始' },
        { phase: '第三阶段', name: '转正答辩PPT', status: 'pending', date: '待开始' },
        { phase: '第四阶段', name: '转正答辩记录', status: 'pending', date: '待开始' }
      ],
      qaStats: { total: 0, answered: 0, pending: 0 }
    };

    // ========== 通知组件 ==========
    function Notification({ message, type, onClose }) {
      const bgColors = { success: '#10b981', warning: '#f59e0b', error: '#ef4444', info: '#3b82f6' };
      useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, [onClose]);
      return <div className="notification" style={{ background: bgColors[type] || bgColors.info }}>{message}</div>;
    }

    // ========== 角色切换 ==========
    function RoleSwitcher({ currentRole, onSwitch, ownerPendingCount }) {
      return (
        <div className="flex gap-2 bg-white p-1 rounded-lg shadow-sm inline-flex">
          {Object.values(ROLES).map(role => (
            <button
              key={role.id}
              onClick={() => onSwitch(role.id)}
              className={`role-btn px-4 py-2 rounded-md text-sm font-medium transition-all flex items-center gap-2 ${currentRole === role.id ? 'active shadow-sm' : 'text-gray-600 hover:bg-gray-100'}`}
            >
              <span>{role.icon}</span>
              <span>{role.name}</span>
              {role.id === 'owner' && ownerPendingCount > 0 && (
                <span className="bg-red-500 text-white text-xs px-2 py-0.5 rounded-full">{ownerPendingCount}</span>
              )}
            </button>
          ))}
        </div>
      );
    }

    // ========== 部门配置表单 ==========
    function DepartmentConfigForm({ config, submitted, onSubmit }) {
      const [formData, setFormData] = useState(config || INITIAL_DEPT_CONFIG);
      const [editing, setEditing] = useState(!submitted);

      const handleSubmit = () => {
        if (!formData.knowledgeBase || !formData.coreMetrics || !formData.dashboard) {
          alert('请填写所有必填项');
          return;
        }
        onSubmit(formData);
        setEditing(false);
      };

      if (!editing && submitted) {
        return (
          <div className="bg-green-50 border border-green-200 rounded-lg p-4 mb-4">
            <div className="flex items-center justify-between mb-2">
              <h3 className="font-semibold text-green-800 flex items-center gap-2"><i className="fas fa-check-circle"></i> 部门学习资料已配置</h3>
              <button onClick={() => setEditing(true)} className="text-sm text-blue-600 hover:underline">编辑</button>
            </div>
            <div className="grid grid-cols-2 gap-3 text-sm">
              <div><span className="text-gray-500">部门名称：</span>{formData.deptName}</div>
              <div><span className="text-gray-500">核心指标：</span>{formData.coreMetrics}</div>
              <div className="col-span-2"><span className="text-gray-500">知识库：</span><a href={formData.knowledgeBase} target="_blank" className="text-blue-600 hover:underline">{formData.knowledgeBase}</a></div>
              <div className="col-span-2"><span className="text-gray-500">看板：</span><a href={formData.dashboard} target="_blank" className="text-blue-600 hover:underline">{formData.dashboard}</a></div>
            </div>
          </div>
        );
      }

      return (
        <div className="bg-white rounded-lg p-4 mb-4 card-shadow">
          <h3 className="font-semibold text-gray-800 mb-3 flex items-center gap-2"><i className="fas fa-building text-blue-500"></i> 部门学习资料配置</h3>
          <div className="space-y-3">
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">部门名称</label>
              <input value={formData.deptName} onChange={e => setFormData({...formData, deptName: e.target.value})} placeholder="请输入部门名称" />
            </div>
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">知识库链接 <span className="text-red-500">*</span></label>
              <input value={formData.knowledgeBase} onChange={e => setFormData({...formData, knowledgeBase: e.target.value})} placeholder="https://alidocs.dingtalk.com/..." />
            </div>
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">核心指标 <span className="text-red-500">*</span></label>
              <input value={formData.coreMetrics} onChange={e => setFormData({...formData, coreMetrics: e.target.value})} placeholder="如：及时发货率、商家体验" />
            </div>
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">看板链接 <span className="text-red-500">*</span></label>
              <input value={formData.dashboard} onChange={e => setFormData({...formData, dashboard: e.target.value})} placeholder="https://fbi.alibaba-inc.com/..." />
            </div>
            <button onClick={handleSubmit} className="btn-primary px-4 py-2 rounded-lg text-sm font-medium"><i className="fas fa-save mr-1"></i> 保存配置</button>
          </div>
        </div>
      );
    }

    // ========== 归档路径配置 ==========
    function ArchivePathConfigForm({ config, submitted, onSubmit }) {
      const [formData, setFormData] = useState(config || INITIAL_ARCHIVE_CONFIG);
      const [editing, setEditing] = useState(!submitted);

      const addDeliverable = () => {
        setFormData({...formData, stageDeliverables: [...formData.stageDeliverables, { phase: 'phase1', phaseName: '第一阶段（新人初期）', name: '', path: '' }]});
      };
      const removeDeliverable = (idx) => {
        const arr = [...formData.stageDeliverables];
        arr.splice(idx, 1);
        setFormData({...formData, stageDeliverables: arr});
      };
      const updateDeliverable = (idx, field, value) => {
        const arr = [...formData.stageDeliverables];
        arr[idx][field] = value;
        if (field === 'phase') {
          const p = PHASES.find(ph => ph.id === value);
          arr[idx].phaseName = p ? p.name : value;
        }
        setFormData({...formData, stageDeliverables: arr});
      };

      const handleSubmit = () => {
        if (!formData.archiveUrl) { alert('请填写归档路径'); return; }
        onSubmit(formData);
        setEditing(false);
      };

      if (!editing && submitted) {
        return (
          <div className="bg-green-50 border border-green-200 rounded-lg p-4 mb-4">
            <div className="flex items-center justify-between mb-2">
              <h3 className="font-semibold text-green-800 flex items-center gap-2"><i className="fas fa-check-circle"></i> 归档路径已配置</h3>
              <button onClick={() => setEditing(true)} className="text-sm text-blue-600 hover:underline">编辑</button>
            </div>
            <div className="text-sm space-y-1">
              <div><span className="text-gray-500">归档路径：</span><a href={formData.archiveUrl} target="_blank" className="text-blue-600 hover:underline">{formData.archiveUrl}</a></div>
              <div><span className="text-gray-500">Q&A文件夹：</span>{formData.qaFolder}</div>
              <div><span className="text-gray-500">交付物文件夹：</span>{formData.deliverableFolder}</div>
              <div><span className="text-gray-500">自动归档：</span>{formData.autoArchive ? '开启' : '关闭'}</div>
              <div className="mt-2"><span className="text-gray-500">交付物数量：</span>{formData.stageDeliverables.length} 个</div>
            </div>
          </div>
        );
      }

      return (
        <div className="bg-white rounded-lg p-4 mb-4 card-shadow">
          <h3 className="font-semibold text-gray-800 mb-3 flex items-center gap-2"><i className="fas fa-folder-open text-amber-500"></i> 归档路径配置</h3>
          <div className="space-y-3">
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">归档文件夹链接 <span className="text-red-500">*</span></label>
              <input value={formData.archiveUrl} onChange={e => setFormData({...formData, archiveUrl: e.target.value})} placeholder="https://alidocs.dingtalk.com/..." />
            </div>
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">Q&A及交付物归档链接</label>
              <input value={formData.qaArchiveUrl || ''} onChange={e => setFormData({...formData, qaArchiveUrl: e.target.value})} placeholder="https://alidocs.dingtalk.com/..." />
            </div>
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">Q&A文件夹名称</label>
                <input value={formData.qaFolder} onChange={e => setFormData({...formData, qaFolder: e.target.value})} />
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">交付物文件夹名称</label>
                <input value={formData.deliverableFolder} onChange={e => setFormData({...formData, deliverableFolder: e.target.value})} />
              </div>
            </div>
            <div className="flex items-center gap-2">
              <input type="checkbox" id="autoArchive" checked={formData.autoArchive} onChange={e => setFormData({...formData, autoArchive: e.target.checked})} className="w-4 h-4" />
              <label htmlFor="autoArchive" className="text-sm text-gray-700">开启自动归档</label>
            </div>

            <div className="border-t pt-3 mt-3">
              <h4 className="text-sm font-semibold text-gray-700 mb-2">各阶段交付物配置</h4>
              {formData.stageDeliverables.map((del, idx) => (
                <div key={idx} className="grid grid-cols-12 gap-2 mb-2 items-center">
                  <div className="col-span-3">
                    <select value={del.phase} onChange={e => updateDeliverable(idx, 'phase', e.target.value)} className="text-sm">
                      {PHASES.filter(p => p.id !== 'pre').map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                    </select>
                  </div>
                  <div className="col-span-4"><input value={del.name} onChange={e => updateDeliverable(idx, 'name', e.target.value)} placeholder="交付物名称" className="text-sm" /></div>
                  <div className="col-span-4"><input value={del.path} onChange={e => updateDeliverable(idx, 'path', e.target.value)} placeholder="归档子路径（选填）" className="text-sm" /></div>
                  <div className="col-span-1"><button onClick={() => removeDeliverable(idx)} className="text-red-500 hover:text-red-700"><i className="fas fa-trash"></i></button></div>
                </div>
              ))}
              <button onClick={addDeliverable} className="text-sm text-blue-600 hover:underline mt-1"><i className="fas fa-plus mr-1"></i>添加交付物</button>
            </div>
            <button onClick={handleSubmit} className="btn-primary px-4 py-2 rounded-lg text-sm font-medium"><i className="fas fa-save mr-1"></i> 保存配置</button>
          </div>
        </div>
      );
    }

    // ========== 模块配置 ==========
    function ModuleConfigForm({ modules, submitted, onSubmit }) {
      const [list, setList] = useState(modules && modules.length > 0 ? modules : INITIAL_MODULES);
      const [editing, setEditing] = useState(!submitted);

      const addModule = () => setList([...list, { id: `mod-${Date.now()}`, name: '', owner: '', knowledgeBase: '', metric: '', dashboard: '', questionBank: '', ownerQuestionBank: '', hasExam: false, status: 'pending' }]);
      const removeModule = (idx) => { const arr = [...list]; arr.splice(idx, 1); setList(arr); };
      const updateModule = (idx, field, value) => { const arr = [...list]; arr[idx][field] = value; setList(arr); };

      const handleSubmit = () => {
        for (const m of list) { if (!m.name || !m.owner) { alert('模块名称和Owner为必填项'); return; } }
        onSubmit(list);
        setEditing(false);
      };

      if (!editing && submitted) {
        return (
          <div className="bg-green-50 border border-green-200 rounded-lg p-4 mb-4">
            <div className="flex items-center justify-between mb-2">
              <h3 className="font-semibold text-green-800 flex items-center gap-2"><i className="fas fa-check-circle"></i> 业务模块已配置 ({list.length}个)</h3>
              <button onClick={() => setEditing(true)} className="text-sm text-blue-600 hover:underline">编辑</button>
            </div>
            <div className="space-y-2">
              {list.map(m => (
                <div key={m.id} className="flex items-center justify-between bg-white rounded p-2 text-sm">
                  <div className="flex items-center gap-3">
                    <span className="font-medium">{m.name}</span>
                    <span className="text-gray-500">Owner: {m.owner}</span>
                    {m.knowledgeBase && <a href={m.knowledgeBase} target="_blank" className="text-blue-600 hover:underline text-xs">知识库</a>}
                    {m.dashboard && m.dashboard !== '/' && <a href={m.dashboard} target="_blank" className="text-blue-600 hover:underline text-xs">看板</a>}
                  </div>
                  <span className={`text-xs px-2 py-0.5 rounded-full ${m.status === 'completed' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}`}>{m.status === 'completed' ? '资料已提交' : '待填写'}</span>
                </div>
              ))}
            </div>
          </div>
        );
      }

        <div className="bg-white rounded-lg p-4 mb-4 card-shadow">

      const parseAndLoadNewbieData = (raw) => {
        try {
          const data = JSON.parse(raw);
          if (!data.version) { showNotification('文件格式不正确，缺少 version 字段', 'error'); return false; }
          if (!data.deliverables || !Array.isArray(data.deliverables)) { showNotification('文件格式不正确，缺少 deliverables', 'error'); return false; }
          setNewbieData(data);
          setImportMode(false);
          setPastedJson('');
          showNotification('已加载新人进度数据', 'success');
          return true;
        } catch (err) {
          showNotification('JSON 解析失败，请检查内容格式', 'error');
          return false;
        }
      };

      const handleImportNewbieData = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          parseAndLoadNewbieData(event.target.result);
        };
        reader.onerror = () => showNotification('文件读取失败', 'error');
        reader.readAsText(file);
        e.target.value = '';
      };

            { id: 'mgr-005', role: 'manager', phase: 'phase1', title: '查收第一阶段交付物', description: '审核新人提交的AE组织架构图学习笔记（重点检查是否了解供应链在AE组织中的位置及跨团队协同关系）、部门知识库学习总结、各模块业务学习报告及Owner自测完成情况', type: 'review', priority: 'medium', estimatedTime: '45分钟', deliverable: '组织架构图学习笔记、部门知识库学习总结、各模块业务学习报告', status: taskStatuses['mgr-005'] || 'pending' },
            { id: 'mgr-006', role: 'manager', phase: 'phase2', title: '1V1对齐OKR', description: '与新人进行1对1沟通，对齐实习期OKR目标', type: 'action', priority: 'high', estimatedTime: '60分钟', deliverable: '实习期目标设定', status: taskStatuses['mgr-006'] || 'pending' },
            { id: 'mgr-007', role: 'manager', phase: 'phase2', title: '查收第二阶段交付物', description: '审核各模块业务学习报告和实习期目标设定', type: 'review', priority: 'medium', estimatedTime: '30分钟', deliverable: '各模块业务学习报告、实习期目标设定', status: taskStatuses['mgr-007'] || 'pending' },
            { id: 'mgr-008', role: 'manager', phase: 'phase3', title: '确定新人业务方向', description: '第5周与新人沟通，确定后续业务深耕方向', type: 'action', priority: 'high', estimatedTime: '30分钟', deliverable: '', status: taskStatuses['mgr-008'] || 'pending' },
            { id: 'mgr-009', role: 'manager', phase: 'phase3', title: '沟通转正事项', description: '第8周与新人沟通转正答辩准备事项', type: 'action', priority: 'high', estimatedTime: '30分钟', deliverable: '转正答辩PPT', status: taskStatuses['mgr-009'] || 'pending' },
            { id: 'mgr-010', role: 'manager', phase: 'phase3', title: '查收第三阶段交付物', description: '审核业务参与实践报告和转正答辩PPT', type: 'review', priority: 'medium', estimatedTime: '45分钟', deliverable: '业务参与实践报告、转正答辩PPT', status: taskStatuses['mgr-010'] || 'pending' },
            { id: 'mgr-011', role: 'manager', phase: 'phase4', title: '组织转正答辩', description: '第12周组织转正答辩会', type: 'action', priority: 'high', estimatedTime: '90分钟', deliverable: '转正答辩记录', status: taskStatuses['mgr-011'] || 'pending' }
          );
        } else {
          modules.forEach((m, idx) => {
            tasks.push({
              id: `owner-${m.id}`, role: 'owner', phase: 'pre', title: `填写「${m.name}」模块资料`, description: `为模块「${m.name}」填写知识库、核心指标、看板链接和题目库`, type: 'owner-task', priority: 'high', estimatedTime: '15分钟', deliverable: '模块学习资料及题目库', status: m.status === 'completed' ? 'done' : 'pending'
            });
          });
          tasks.push(
            { id: 'owner-qa-001', role: 'owner', phase: 'all', title: '回答新人Q&A', description: '回答新人针对模块提出的问题', type: 'reactive', priority: 'medium', estimatedTime: '10分钟', deliverable: '', status: 'pending' },
            { id: 'owner-qa-002', role: 'owner', phase: 'all', title: '模块讲解邀约', description: '应新人邀请进行模块知识讲解', type: 'reactive', priority: 'medium', estimatedTime: '30分钟', deliverable: '', status: 'pending' }
          );
        }
        return tasks.map(t => ({ ...t, status: taskStatuses[t.id] || t.status }));
      };

      const tasks = generateTasks();
      const canGenerateLanding = deptSubmitted && archiveSubmitted && modulesSubmitted;
      const ownerPendingCount = modules.filter(m => m.status !== 'completed').length;

      const toggleTask = (id) => {
        const current = taskStatuses[id] || tasks.find(t => t.id === id)?.status || 'pending';
        const next = current === 'done' ? 'pending' : 'done';
        setTaskStatuses({ ...taskStatuses, [id]: next });
      };

      return (
        <div className="min-h-screen bg-gray-50">
          {notification && <Notification message={notification.message} type={notification.type} onClose={() => setNotification(null)} />}

          {/* Header */}
          <div className="gradient-bg text-white">
            <div className="max-w-5xl mx-auto px-4 py-6">
              <div className="flex items-center justify-between">
                <div>
                  <h1 className="text-xl font-bold">新人入职Landing系统</h1>
                  <p className="text-sm text-blue-100 mt-1">{INITIAL_DEPT_CONFIG.deptName} · 主管配置端</p>
                </div>
                <div className="text-right text-sm text-blue-100">
                  <div>新人：{NEWBIE_INFO.name}</div>
                  <div>入职日期：{NEWBIE_INFO.joinDate}</div>
                  <div>师兄：{NEWBIE_INFO.mentor}</div>
                </div>
              </div>
            </div>
          </div>

          <div className="max-w-5xl mx-auto px-4 py-6">
            <div className="flex items-center justify-between mb-4">
              <RoleSwitcher currentRole={currentRole} onSwitch={setCurrentRole} ownerPendingCount={ownerPendingCount} />
              <div className="text-sm text-gray-500">
                {currentRole === 'manager' ? ROLES.manager.desc : ROLES.owner.desc}
              </div>
            </div>

            {currentRole === 'manager' && (
              <>
                <StatsPanel tasks={tasks} />
                <LandingGenerator canGenerate={canGenerateLanding} newbieInfo={NEWBIE_INFO} onGenerate={() => { setLandingGenerated(true); showNotification('Landing文件生成成功！', 'success'); }} />

                <div className="flex items-center justify-between mb-3">
                  <h2 className="text-lg font-semibold text-gray-800">新人进展与交付物</h2>
                  <div className="flex gap-2">
                    {newbieData && <button onClick={() => setNewbieData(null)} className="text-xs px-3 py-1.5 bg-gray-200 text-gray-700 rounded-full hover:bg-gray-300"><i className="fas fa-trash mr-1"></i>清除数据</button>}
                    <button onClick={() => setImportMode(!importMode)} className="text-xs px-3 py-1.5 bg-blue-600 text-white rounded-full hover:bg-blue-700"><i className="fas fa-upload mr-1"></i>导入新人进度</button>
                  </div>
                </div>

                {importMode && (
                  <div className="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-4">
                    <div className="flex items-center gap-2 mb-3">
                      <button onClick={() => fileInputRef.current?.click()} className="text-xs px-3 py-1.5 bg-white text-blue-700 border border-blue-300 rounded-full hover:bg-blue-100"><i className="fas fa-file-import mr-1"></i>选择 JSON 文件</button>
                      <input type="file" accept=".json" ref={fileInputRef} onChange={handleImportNewbieData} style={{ display: 'none' }} />
                      <span className="text-xs text-gray-500">或直接把 JSON 内容粘贴到下方</span>
                    </div>
                    <textarea
                      value={pastedJson}
                      onChange={e => setPastedJson(e.target.value)}
                      placeholder="把新人导出的 JSON 内容粘贴到这里..."
                      rows="4"
                      className="w-full text-xs mb-2"
                    />
                    <div className="flex gap-2">
                      <button onClick={handlePasteImport} className="text-xs px-4 py-1.5 bg-green-600 text-white rounded-full hover:bg-green-700"><i className="fas fa-check mr-1"></i>确认导入</button>
                      <button onClick={() => { setImportMode(false); setPastedJson(''); }} className="text-xs px-3 py-1.5 bg-gray-200 text-gray-700 rounded-full hover:bg-gray-300">取消</button>
                    </div>
                  </div>
                )}
                <NewbieProgressPanel data={newbieData ? {
                  overallProgress: Math.round(Object.values(newbieData.phasesProgress || {}).reduce((a,b)=>a+b,0)/4),
                  teamIntegration: Math.min(100, Math.round(((newbieData.phasesProgress?.phase1||0)*0.8 + (newbieData.phasesProgress?.phase2||0)*0.2))),
                  businessMastery: Math.round(((newbieData.phasesProgress?.phase2||0) + (newbieData.phasesProgress?.phase3||0) + (newbieData.phasesProgress?.phase4||0))/3),
                  modules: MODULES.map(m => ({
                    name: m.name,
                    progress: newbieData.moduleStatus?.[m.id] ? 100 : 0,
                    score: null,
                    status: newbieData.moduleStatus?.[m.id] ? 'completed' : 'pending'
                  })),
                  deliverables: newbieData.deliverables || [],
                  qaStats: {
                    total: newbieData.qaList?.length || 0,
                    answered: newbieData.qaList?.filter(q => q.status === 'answered').length || 0,
                    pending: newbieData.qaList?.filter(q => q.status === 'pending').length || 0
                  }
                } : NEWBIE_PROGRESS_DATA} />
                <DeliverableReviewPanel data={newbieData} />

                <div className="mb-2">
                  <h2 className="text-lg font-semibold text-gray-800 mb-3">配置管理</h2>
                  <DepartmentConfigForm config={deptConfig} submitted={deptSubmitted} onSubmit={(data) => { setDeptConfig(data); setDeptSubmitted(true); showNotification('部门资料已保存', 'success'); }} />
                  <ArchivePathConfigForm config={archiveConfig} submitted={archiveSubmitted} onSubmit={(data) => { setArchiveConfig(data); setArchiveSubmitted(true); showNotification('归档路径已保存', 'success'); }} />
                  <ModuleConfigForm modules={modules} submitted={modulesSubmitted} onSubmit={(data) => { setModules(data); setModulesSubmitted(true); showNotification('模块配置已保存', 'success'); }} />
                </div>

                <div className="mb-2">
                  <h2 className="text-lg font-semibold text-gray-800 mb-3">任务列表</h2>
                  {PHASES.map(phase => {
                    const phaseTasks = tasks.filter(t => t.phase === phase.id || (phase.id === 'all' && t.phase === 'all'));
                    if (phaseTasks.length === 0) return null;
                    return (
                      <div key={phase.id} className="mb-4">
                        <div className="phase-header" style={{ borderColor: phase.color }}>
                          <h3 className="font-semibold text-gray-800">{phase.name}</h3>
                          <p className="text-xs text-gray-500">{phase.desc}</p>
                        </div>
                        {phaseTasks.map(task => <TaskItem key={task.id} task={task} onToggle={toggleTask} />)}
                      </div>
                    );
                  })}
                </div>
              </>
            )}

            {currentRole === 'owner' && (
              <>
                <StatsPanel tasks={tasks} />
                <div className="mb-2">
                  <h2 className="text-lg font-semibold text-gray-800 mb-3">模块资料填写</h2>
                  <OwnerModuleForm modules={modules} onUpdate={(updated) => { setModules(updated); showNotification('模块资料已更新', 'success'); }} />
                </div>
                <div className="mb-2">
                  <h2 className="text-lg font-semibold text-gray-800 mb-3">任务列表</h2>
                  {tasks.map(task => <TaskItem key={task.id} task={task} onToggle={toggleTask} />)}
                </div>
              </>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
